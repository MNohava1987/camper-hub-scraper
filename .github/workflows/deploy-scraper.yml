name: Deploy Scraper

on:
  push:
    branches: [main]
    paths:
      - 'scraper/**'
      - 'Dockerfile.scraper'
      - '.github/workflows/deploy-scraper.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build image
        run: |
          gcloud builds submit . \
            --dockerfile Dockerfile.scraper \
            --tag ${{ vars.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/camper-hub/scraper:${{ github.sha }} \
            --project ${{ vars.PROJECT_ID }}

      - name: Tag latest
        run: |
          gcloud artifacts docker tags add \
            ${{ vars.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/camper-hub/scraper:${{ github.sha }} \
            ${{ vars.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/camper-hub/scraper:latest \
            --project ${{ vars.PROJECT_ID }}

      - name: Update Cloud Run Job image
        run: |
          gcloud run jobs update camper-hub-scraper \
            --image ${{ vars.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/camper-hub/scraper:${{ github.sha }} \
            --region ${{ vars.REGION }} \
            --project ${{ vars.PROJECT_ID }}
