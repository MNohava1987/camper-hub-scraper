name: Infrastructure (Terraform)

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA_EMAIL }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.7'

      - name: Terraform init
        run: terraform init -reconfigure

      - name: Plan (apply)
        if: inputs.action == 'plan' || inputs.action == 'apply'
        env:
          TF_VAR_upload_token: ${{ secrets.TF_UPLOAD_TOKEN }}
        run: terraform plan -var-file=environments/prod/terraform.tfvars -out=tfplan

      - name: Plan (destroy)
        if: inputs.action == 'destroy'
        env:
          TF_VAR_upload_token: ${{ secrets.TF_UPLOAD_TOKEN }}
        run: terraform plan -destroy -var-file=environments/prod/terraform.tfvars -out=tfplan

      - name: Apply
        if: inputs.action == 'apply' || inputs.action == 'destroy'
        run: terraform apply tfplan
